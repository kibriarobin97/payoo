<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-slate-800">
    <section
      class="max-w-md min-h-screen mx-auto py-6 bg-gray-200 flex flex-col justify-center items-center gap-5"
    >
      <header>
        <nav class="flex justify-center items-center">
          <div><img src="assets/Logo-full.png" alt="" /></div>
        </nav>
      </header>
      <!-- login section -->
      <div class="w-full">
        <div class="px-5">
          <div class="card bg-base-100 shadow-2xl rounded-xl">
            <form class="card-body">
              <fieldset class="fieldset">
                <label class="font-medium text-black">Account Number</label>
                <input
                  id="account-number"
                  type="number"
                  class="input border-none bg-[#F4F5F7] rounded-full w-full"
                  placeholder="Enter your number"
                  required
                />
                <label class="font-medium text-black">4 Digit Pin</label>
                <input
                  id="pin"
                  type="text"
                  class="input border-none bg-[#F4F5F7] rounded-full w-full"
                  placeholder="Enter 4 digit pin"
                  required
                />
                <div><a class="link link-hover">Forgot password?</a></div>
                <button
                  id="login-btn"
                  class="btn btn-primary rounded-full font-bold mt-4"
                >
                  Login
                </button>
              </fieldset>
            </form>
          </div>
        </div>
      </div>
    </section>

    <script src="./script/login.js"></script>
  </body>
</html>
